name: Build Distributables

# Triggers:
#   - Push a tag like  git tag v1.2.3 && git push --tags
#   - Or run manually from the Actions tab
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # required to create releases and upload assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 before June 2026 deadline

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  #  macOS  →  sptPALM.app  →  sptPALM-macOS.dmg
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest          # arm64 (M-series); change to macos-13 for Intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # 3.12 = best PyInstaller + scientific-Python support

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller==6.11.1"   # pinned for reproducible Tcl/Tk bundling behaviour

      - name: Build .app
        run: pyinstaller sptpalm.spec --noconfirm --clean

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "sptPALM" \
            -srcfolder "dist/sptPALM.app" \
            -ov -format UDZO \
            "dist/sptPALM-macOS.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: sptPALM-macOS
          path: dist/sptPALM-macOS.dmg
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sptPALM-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  #  Windows  →  sptPALM folder  →  sptPALM-Windows.zip
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: build-macos   # ensures macOS creates the release first; Windows then uploads to it

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller==6.11.1"   # pinned for reproducible Tcl/Tk bundling behaviour

      - name: Build exe bundle
        run: pyinstaller sptpalm.spec --noconfirm --clean

      - name: Bundle Tcl/Tk data (fallback)
        shell: pwsh
        run: |
          # The spec file tries to bundle _tcl_data/_tk_data at build time.
          # This step is a hard fallback: if they are still missing after the
          # build (spec discovery failed), find and copy them now.
          $internal = "dist\sptPALM\_internal"

          # Use _tkinter constants for exact version — no Tk window needed
          $tclVer = python -c "import _tkinter; print(_tkinter.TCL_VERSION)"
          $tkVer  = python -c "import _tkinter; print(_tkinter.TK_VERSION)"
          Write-Host "TCL version: $tclVer  |  TK version: $tkVer"

          # Try multiple candidate locations for each
          function Find-TclDir($ver, $prefix) {
            $candidates = @(
              (Join-Path $prefix "tcl\tcl$ver"),
              (Join-Path $prefix "tcl$ver"),
              (Join-Path $prefix "lib\tcl$ver")
            )
            foreach ($c in $candidates) {
              if (Test-Path $c -PathType Container) { return $c }
            }
            # Broad glob fallback
            $hits = Get-ChildItem (Join-Path $prefix "tcl") -Directory -Filter "tcl$($ver[0])*" -ErrorAction SilentlyContinue | Sort-Object Name
            if ($hits) { return $hits[-1].FullName }
            return $null
          }
          function Find-TkDir($ver, $prefix) {
            $candidates = @(
              (Join-Path $prefix "tcl\tk$ver"),
              (Join-Path $prefix "tk$ver"),
              (Join-Path $prefix "lib\tk$ver")
            )
            foreach ($c in $candidates) {
              if (Test-Path $c -PathType Container) { return $c }
            }
            $hits = Get-ChildItem (Join-Path $prefix "tcl") -Directory -Filter "tk$($ver[0])*" -ErrorAction SilentlyContinue | Sort-Object Name
            if ($hits) { return $hits[-1].FullName }
            return $null
          }

          $prefix = python -c "import sys; print(sys.prefix)"
          Write-Host "sys.prefix: $prefix"

          $tclSrc = Find-TclDir $tclVer $prefix
          $tkSrc  = Find-TkDir  $tkVer  $prefix
          Write-Host "TCL src: $tclSrc"
          Write-Host "TK  src: $tkSrc"

          $tclDest = Join-Path $internal "_tcl_data"
          $tkDest  = Join-Path $internal "_tk_data"

          if (-not (Test-Path $tclDest)) {
            if ($tclSrc -and (Test-Path $tclSrc)) {
              Copy-Item $tclSrc $tclDest -Recurse -Force
              Write-Host "Fallback: copied _tcl_data from $tclSrc"
            } else {
              Write-Error "FATAL: cannot find Tcl $tclVer data directory"
              exit 1
            }
          } else { Write-Host "_tcl_data already present (from spec)" }

          if (-not (Test-Path $tkDest)) {
            if ($tkSrc -and (Test-Path $tkSrc)) {
              Copy-Item $tkSrc $tkDest -Recurse -Force
              Write-Host "Fallback: copied _tk_data from $tkSrc"
            } else {
              Write-Error "FATAL: cannot find Tk $tkVer data directory"
              exit 1
            }
          } else { Write-Host "_tk_data already present (from spec)" }

      - name: Bundle VC++ runtime DLLs
        shell: pwsh
        run: |
          # python312.dll requires vcruntime140.dll / vcruntime140_1.dll at
          # runtime. These are NOT guaranteed on all Windows machines.
          # Strategy: use ctypes to ask Python where it loaded each DLL from
          # (guaranteed correct since Python itself already loaded them), then
          # copy those exact files into _internal alongside python312.dll.
          $internal = "dist\sptPALM\_internal"

          foreach ($dll in @("vcruntime140.dll", "vcruntime140_1.dll")) {
            if (Test-Path (Join-Path $internal $dll)) { Write-Host "$dll already in bundle"; continue }
            $src = python -c "import ctypes,ctypes.wintypes; lib=ctypes.WinDLL('$dll'); buf=ctypes.create_unicode_buffer(32768); ctypes.windll.kernel32.GetModuleFileNameW(lib._handle,buf,32768); print(buf.value)"
            if ($src -and (Test-Path $src)) {
              Copy-Item $src $internal -Force
              Write-Host "Copied $dll from $src"
            } else {
              Write-Warning "$dll not found — users may need VC++ Redistributable"
            }
          }

          Write-Host "--- _internal DLLs ---"
          Get-ChildItem $internal -Filter "*.dll" | Select-Object Name | Format-Table

      - name: Verify bundle contents
        shell: pwsh
        run: |
          # Hard-fail the build if any critical file or directory is missing.
          # This catches packaging regressions before users download a broken zip.
          $internal = "dist\sptPALM\_internal"
          $ok = $true

          # Tcl/Tk data — required for the Tkinter GUI to start
          foreach ($dir in @("_tcl_data", "_tk_data")) {
            $path = Join-Path $internal $dir
            if (Test-Path $path) {
              Write-Host "OK  $dir"
            } else {
              Write-Error "MISSING: $path"
              $ok = $false
            }
          }

          # Core Python DLL
          $pyDll = Get-ChildItem $internal -Filter "python3*.dll" | Select-Object -First 1
          if ($pyDll) { Write-Host "OK  $($pyDll.Name)" } else { Write-Error "MISSING: python3xx.dll"; $ok = $false }

          # VC++ runtime (non-fatal warning only — not all runners have it)
          foreach ($dll in @("vcruntime140.dll", "vcruntime140_1.dll")) {
            if (Test-Path (Join-Path $internal $dll)) { Write-Host "OK  $dll" } else { Write-Warning "ABSENT: $dll (users may need VC++ Redist)" }
          }

          # Main executable
          if (Test-Path "dist\sptPALM\sptPALM.exe") { Write-Host "OK  sptPALM.exe" } else { Write-Error "MISSING: sptPALM.exe"; $ok = $false }

          if (-not $ok) { exit 1 }
          Write-Host "All critical bundle checks passed."

      - name: Smoke test (launch the app)
        shell: pwsh
        run: |
          # Actually launch the exe to verify it doesn't crash on startup.
          # The most common startup crash is the Tcl/Tk FileNotFoundError —
          # this step catches it BEFORE the broken zip ships to users.
          $exe = "dist\sptPALM\sptPALM.exe"
          Write-Host "Launching $exe ..."
          $proc = Start-Process -FilePath $exe -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 12
          if ($proc.HasExited) {
            $code = $proc.ExitCode
            Write-Error "FATAL: app exited with code $code within 12s — startup crash (likely Tcl/Tk or DLL issue)"
            exit 1
          }
          Write-Host "OK: app still running after 12s — GUI initialised successfully"
          $proc.Kill()
          $proc.WaitForExit(5000) | Out-Null

      - name: Zip the dist folder
        shell: powershell
        run: Compress-Archive -Path dist\sptPALM -DestinationPath dist\sptPALM-Windows.zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: sptPALM-Windows
          path: dist\sptPALM-Windows.zip
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\sptPALM-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
