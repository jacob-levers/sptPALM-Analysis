name: Build Distributables

# Triggers:
#   - Push a tag like  git tag v1.2.3 && git push --tags
#   - Or run manually from the Actions tab
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # required to create releases and upload assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 before June 2026 deadline

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  #  macOS  →  sptPALM.app  →  sptPALM-macOS.dmg
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest          # arm64 (M-series); change to macos-13 for Intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # 3.12 = best PyInstaller + scientific-Python support

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app
        run: pyinstaller sptpalm.spec --noconfirm --clean

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "sptPALM" \
            -srcfolder "dist/sptPALM.app" \
            -ov -format UDZO \
            "dist/sptPALM-macOS.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: sptPALM-macOS
          path: dist/sptPALM-macOS.dmg
          retention-days: 30

      # Optional: attach to a GitHub Release when a tag is pushed
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sptPALM-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  #  Windows  →  sptPALM folder  →  sptPALM-Windows.zip
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: build-macos   # ensures macOS creates the release first; Windows then uploads to it

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe bundle
        run: pyinstaller sptpalm.spec --noconfirm --clean

      - name: Bundle Tcl/Tk data
        shell: pwsh
        run: |
          $internal = "dist\sptPALM\_internal"
          $tclDest  = Join-Path $internal "_tcl_data"
          $tkDest   = Join-Path $internal "_tk_data"

          # Filter glob results to directories only — .lib files also match tcl8* / tk8*
          $tclSrc = python -c "import sys,os,glob; h=[d for d in glob.glob(os.path.join(sys.prefix,'tcl','tcl8*')) if os.path.isdir(d)]; print(sorted(h)[-1] if h else '')"
          $tkSrc  = python -c "import sys,os,glob; h=[d for d in glob.glob(os.path.join(sys.prefix,'tcl','tk8*'))  if os.path.isdir(d)]; print(sorted(h)[-1] if h else '')"
          Write-Host "TCL dir : $tclSrc"
          Write-Host "TK  dir : $tkSrc"

          if (-not $tclSrc -or -not (Test-Path $tclSrc)) { Write-Error "tcl8.x directory not found"; exit 1 }
          if (-not $tkSrc  -or -not (Test-Path $tkSrc))  { Write-Error "tk8.x directory not found";  exit 1 }

          if (-not (Test-Path $tclDest)) { Copy-Item $tclSrc $tclDest -Recurse -Force; Write-Host "Copied _tcl_data" }
          if (-not (Test-Path $tkDest))  { Copy-Item $tkSrc  $tkDest  -Recurse -Force; Write-Host "Copied _tk_data"  }
          Write-Host "_tcl_data exists: $(Test-Path $tclDest)"
          Write-Host "_tk_data  exists: $(Test-Path $tkDest)"

      - name: Bundle VC++ runtime DLLs
        shell: pwsh
        run: |
          # python312.dll requires vcruntime140.dll / vcruntime140_1.dll at
          # runtime. These are NOT guaranteed on all Windows machines.
          # Strategy: use ctypes to ask Python where it loaded each DLL from
          # (guaranteed correct since Python itself already loaded them), then
          # copy those exact files into _internal alongside python312.dll.
          $internal = "dist\sptPALM\_internal"

          foreach ($dll in @("vcruntime140.dll", "vcruntime140_1.dll")) {
            if (Test-Path (Join-Path $internal $dll)) {
              Write-Host "$dll already in bundle — skipping"
              continue
            }
            $src = python -c "
import ctypes, ctypes.wintypes, os
try:
    lib = ctypes.WinDLL('$dll')
    buf = ctypes.create_unicode_buffer(32768)
    ctypes.windll.kernel32.GetModuleFileNameW(lib._handle, buf, 32768)
    print(buf.value)
except Exception as e:
    print('')
"
            if ($src -and (Test-Path $src)) {
              Copy-Item $src $internal -Force
              Write-Host "Copied $dll from $src"
            } else {
              Write-Warning "$dll not found via ctypes — users may need to install VC++ Redistributable"
            }
          }

          Write-Host "--- _internal DLLs ---"
          Get-ChildItem $internal -Filter "*.dll" | Select-Object Name | Format-Table

      - name: Zip the dist folder
        run: |
          Compress-Archive -Path dist\sptPALM -DestinationPath dist\sptPALM-Windows.zip
        shell: powershell

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: sptPALM-Windows
          path: dist\sptPALM-Windows.zip
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\sptPALM-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
