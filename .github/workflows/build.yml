name: Build Distributables

# Triggers:
#   - Push a tag like  git tag v1.2.3 && git push --tags
#   - Or run manually from the Actions tab
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # required to create releases and upload assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 before June 2026 deadline

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  #  macOS  →  sptPALM.app  →  sptPALM-macOS.dmg
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest          # arm64 (M-series); change to macos-13 for Intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # 3.12 = best PyInstaller + scientific-Python support

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller==6.11.1"   # pinned for reproducible Tcl/Tk bundling behaviour

      - name: Build .app
        run: pyinstaller sptpalm.spec --noconfirm --clean

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "sptPALM" \
            -srcfolder "dist/sptPALM.app" \
            -ov -format UDZO \
            "dist/sptPALM-macOS.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: sptPALM-macOS
          path: dist/sptPALM-macOS.dmg
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sptPALM-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  #  Windows  →  sptPALM folder  →  sptPALM-Windows.zip
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: build-macos   # ensures macOS creates the release first; Windows then uploads to it

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller==6.11.1"   # pinned for reproducible Tcl/Tk bundling behaviour

      - name: Build exe (onefile)
        # Spec produces a single self-contained sptPALM.exe.  Tcl/Tk and all
        # binaries are bundled INSIDE the exe and extracted to %TEMP% at
        # runtime — no chance of user extraction dropping files.
        run: pyinstaller sptpalm.spec --noconfirm --clean

      - name: Verify exe exists and is reasonable size
        shell: pwsh
        run: |
          $exe = "dist\sptPALM.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "FATAL: $exe not produced by build"
            exit 1
          }
          $sizeMB = (Get-Item $exe).Length / 1MB
          Write-Host ("sptPALM.exe size: {0:N1} MB" -f $sizeMB)
          if ($sizeMB -lt 50) {
            Write-Error "FATAL: $exe is suspiciously small ($sizeMB MB) — bundle is incomplete"
            exit 1
          }

      - name: Smoke test (launch the onefile exe)
        shell: pwsh
        run: |
          # Marker-file handshake: app writes a file only AFTER Tk fully
          # initialises.  Catches startup crashes that PyInstaller hides
          # behind an error dialog (which would otherwise keep HasExited false).
          $exe    = "dist\sptPALM.exe"
          $marker = Join-Path $env:RUNNER_TEMP "sptpalm_ready.marker"
          Remove-Item -Path $marker -ErrorAction SilentlyContinue
          $env:SPTPALM_READY_MARKER = $marker

          Write-Host "Launching $exe (onefile bootloader will extract to TEMP — first launch is slower)..."
          $proc = Start-Process -FilePath $exe -PassThru -WindowStyle Hidden

          # Onefile takes longer to start (extracts to %TEMP%): give 60s
          $deadline = (Get-Date).AddSeconds(60)
          $ready = $false
          while ((Get-Date) -lt $deadline) {
            if (Test-Path $marker) { $ready = $true; break }
            if ($proc.HasExited) {
              Write-Error "FATAL: process exited with code $($proc.ExitCode) before writing ready marker"
              exit 1
            }
            Start-Sleep -Milliseconds 500
          }
          if (-not $ready) {
            Write-Error "FATAL: app did not signal ready within 60s — startup crash hidden by error dialog"
            try { $proc.Kill() } catch {}
            exit 1
          }
          Write-Host "OK: ready marker written — onefile bundle is healthy"
          $proc.Kill()
          $proc.WaitForExit(5000) | Out-Null

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: sptPALM-Windows
          path: dist\sptPALM.exe
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\sptPALM.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
