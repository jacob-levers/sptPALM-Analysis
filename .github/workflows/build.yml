name: Build Distributables

# Triggers:
#   - Push a tag like  git tag v1.2.3 && git push --tags
#   - Or run manually from the Actions tab
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # required to create releases and upload assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 before June 2026 deadline

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  #  macOS  →  sptPALM.app  →  sptPALM-macOS.dmg
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest          # arm64 (M-series); change to macos-13 for Intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # 3.12 = best PyInstaller + scientific-Python support

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app
        run: pyinstaller sptpalm.spec --noconfirm --clean

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "sptPALM" \
            -srcfolder "dist/sptPALM.app" \
            -ov -format UDZO \
            "dist/sptPALM-macOS.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: sptPALM-macOS
          path: dist/sptPALM-macOS.dmg
          retention-days: 30

      # Optional: attach to a GitHub Release when a tag is pushed
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sptPALM-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  #  Windows  →  sptPALM folder  →  sptPALM-Windows.zip
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: build-macos   # ensures macOS creates the release first; Windows then uploads to it

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe bundle
        run: pyinstaller sptpalm.spec --noconfirm --clean

      - name: Verify VC++ runtime DLLs bundled
        shell: powershell
        run: |
          # The spec file injects vcruntime140.dll etc. as binaries.
          # Verify at least the critical one made it into the bundle.
          $dll = "dist\sptPALM\_internal\vcruntime140.dll"
          if (Test-Path $dll) {
            Write-Host "vcruntime140.dll present."
          } else {
            Write-Warning "vcruntime140.dll not found in bundle — users may see DLL error."
          }

      - name: Ensure Tcl/Tk data bundled
        shell: powershell
        run: |
          # PyInstaller should auto-collect Tcl/Tk data, but falls back here if not.
          $dest    = "dist\sptPALM\_internal"
          $tclDest = Join-Path $dest "_tcl_data"
          $tkDest  = Join-Path $dest "_tk_data"

          if ((Test-Path $tclDest) -and (Test-Path $tkDest)) {
            Write-Host "Tcl/Tk data already present — nothing to do."
          } else {
            Write-Host "Tcl/Tk data missing from bundle, copying manually..."

            # Locate Python's tcl/ directory (setup-python puts it next to python.exe)
            $pyDir   = python -c "import sys,os; print(os.path.dirname(sys.executable))"
            $tclRoot = Join-Path $pyDir "tcl"

            if (-not (Test-Path $tclRoot)) {
              # Some setups put tcl/ one level up
              $tclRoot = Join-Path (Split-Path $pyDir) "tcl"
            }

            if (Test-Path $tclRoot) {
              Write-Host "Found Tcl root: $tclRoot"
              Get-ChildItem $tclRoot -Directory | ForEach-Object {
                if ($_.Name -match "^tcl" -and -not (Test-Path $tclDest)) {
                  Copy-Item $_.FullName $tclDest -Recurse -Force
                  Write-Host "Copied $_  -> _tcl_data"
                } elseif ($_.Name -match "^tk" -and -not (Test-Path $tkDest)) {
                  Copy-Item $_.FullName $tkDest -Recurse -Force
                  Write-Host "Copied $_ -> _tk_data"
                }
              }
            } else {
              Write-Warning "Could not locate Python tcl/ directory at $tclRoot"
            }
          }

          # Final status (warnings only, never fail the build)
          if (Test-Path $tclDest) { Write-Host "_tcl_data OK" } else { Write-Warning "_tcl_data missing" }
          if (Test-Path $tkDest)  { Write-Host "_tk_data OK"  } else { Write-Warning "_tk_data missing"  }

      - name: Zip the dist folder
        run: |
          Compress-Archive -Path dist\sptPALM -DestinationPath dist\sptPALM-Windows.zip
        shell: powershell

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: sptPALM-Windows
          path: dist\sptPALM-Windows.zip
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\sptPALM-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
