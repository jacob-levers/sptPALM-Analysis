name: Build Distributables

# Triggers:
#   - Push a tag like  git tag v1.2.3 && git push --tags
#   - Or run manually from the Actions tab
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # required to create releases and upload assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 before June 2026 deadline

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  #  macOS  →  sptPALM.app  →  sptPALM-macOS.dmg
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest          # arm64 (M-series); change to macos-13 for Intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # 3.12 = best PyInstaller + scientific-Python support

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app
        run: pyinstaller sptpalm.spec --noconfirm --clean

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "sptPALM" \
            -srcfolder "dist/sptPALM.app" \
            -ov -format UDZO \
            "dist/sptPALM-macOS.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: sptPALM-macOS
          path: dist/sptPALM-macOS.dmg
          retention-days: 30

      # Optional: attach to a GitHub Release when a tag is pushed
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sptPALM-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  #  Windows  →  sptPALM folder  →  sptPALM-Windows.zip
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: build-macos   # ensures macOS creates the release first; Windows then uploads to it

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe bundle
        run: pyinstaller sptpalm.spec --noconfirm --clean

      - name: Fix Windows runtime dependencies
        shell: pwsh
        run: |
          $internal = "dist\sptPALM\_internal"
          $pyDir    = python -c "import sys,os; print(os.path.dirname(sys.executable))"
          Write-Host "Python dir: $pyDir"
          Write-Host "Bundle internal dir exists: $(Test-Path $internal)"

          # ── 1. VC++ runtime DLLs ────────────────────────────────────────────
          # python312.dll needs these; they are NOT present on all Windows machines.
          $dllSources = @($pyDir, "$env:SystemRoot\System32")
          foreach ($dll in @("vcruntime140.dll","vcruntime140_1.dll","msvcp140.dll","msvcp140_1.dll")) {
            if (Test-Path (Join-Path $internal $dll)) {
              Write-Host "$dll already in bundle"
              continue
            }
            foreach ($src in $dllSources) {
              $candidate = Join-Path $src $dll
              if (Test-Path $candidate) {
                Copy-Item $candidate $internal -Force
                Write-Host "Copied $dll from $src"
                break
              }
            }
            if (-not (Test-Path (Join-Path $internal $dll))) {
              Write-Warning "$dll not found in any search location"
            }
          }

          # ── 2. Tcl/Tk data directories ──────────────────────────────────────
          # Tkinter needs _tcl_data and _tk_data in _internal\.
          $tclDest = Join-Path $internal "_tcl_data"
          $tkDest  = Join-Path $internal "_tk_data"

          if ((Test-Path $tclDest) -and (Test-Path $tkDest)) {
            Write-Host "Tcl/Tk data already in bundle"
          } else {
            # Search for tcl root in common locations
            $tclRoot = $null
            foreach ($candidate in @(
              (Join-Path $pyDir "tcl"),
              (Join-Path (Split-Path $pyDir -Parent) "tcl"),
              "C:\hostedtoolcache\windows\Python\3.12*\x64\tcl"
            )) {
              $resolved = Resolve-Path $candidate -ErrorAction SilentlyContinue
              if ($resolved) { $tclRoot = $resolved.Path; break }
            }

            if ($tclRoot) {
              Write-Host "Tcl root: $tclRoot"
              foreach ($dir in Get-ChildItem $tclRoot -Directory) {
                if ($dir.Name -match "^tcl\d" -and -not (Test-Path $tclDest)) {
                  Copy-Item $dir.FullName $tclDest -Recurse -Force
                  Write-Host "Copied $($dir.Name) -> _tcl_data"
                } elseif ($dir.Name -match "^tk\d" -and -not (Test-Path $tkDest)) {
                  Copy-Item $dir.FullName $tkDest -Recurse -Force
                  Write-Host "Copied $($dir.Name) -> _tk_data"
                }
              }
            } else {
              Write-Warning "Could not find Python tcl/ directory — Tkinter may fail at runtime"
            }
          }

          # ── Summary ─────────────────────────────────────────────────────────
          Write-Host "--- Bundle contents (top level) ---"
          Get-ChildItem $internal | Select-Object Name | Format-Table
          Write-Host "vcruntime140.dll : $(Test-Path (Join-Path $internal 'vcruntime140.dll'))"
          Write-Host "_tcl_data        : $(Test-Path $tclDest)"
          Write-Host "_tk_data         : $(Test-Path $tkDest)"

      - name: Zip the dist folder
        run: |
          Compress-Archive -Path dist\sptPALM -DestinationPath dist\sptPALM-Windows.zip
        shell: powershell

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: sptPALM-Windows
          path: dist\sptPALM-Windows.zip
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\sptPALM-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
