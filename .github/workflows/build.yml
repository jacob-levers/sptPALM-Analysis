name: Build Distributables

# Triggers:
#   - Push a tag like  git tag v1.2.3 && git push --tags
#   - Or run manually from the Actions tab
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # required to create releases and upload assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 before June 2026 deadline

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  #  macOS  →  FIREFLY.app  →  FIREFLY-macOS.dmg
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest          # arm64 (M-series); change to macos-13 for Intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # 3.12 = best PyInstaller + scientific-Python support

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller==6.11.1"   # pinned for reproducible Tcl/Tk bundling behaviour

      - name: Build .app
        run: pyinstaller sptpalm.spec --noconfirm --clean

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "FIREFLY" \
            -srcfolder "dist/FIREFLY.app" \
            -ov -format UDZO \
            "dist/FIREFLY-macOS.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FIREFLY-macOS
          path: dist/FIREFLY-macOS.dmg
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FIREFLY-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  #  Windows  →  FIREFLY folder  →  FIREFLY-Windows.zip
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    # Independent of the macOS job — if the Mac build fails (or is
    # skipped on a Windows-only run) we still want the Windows .exe
    # to be built and attached to the release.  softprops/action-gh-release
    # creates the release if it doesn't exist yet and appends assets to
    # it if another job already did.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # IMPORTANT — torch order matters on Windows.
        # `pip install torch` from PyPI pulls the CPU-only wheel.  The
        # CUDA wheels live on PyTorch's own index, so we install them
        # FIRST (matching the >=2.3,<3 pin from requirements.txt) — the
        # subsequent `pip install -r requirements.txt` then sees torch
        # already satisfied and leaves the CUDA build in place.
        #
        # cu118 (CUDA 11.8) is the smallest current CUDA torch wheel —
        # the larger cu121/cu124 builds push the final .exe over
        # GitHub's 2 GiB release-asset cap, which causes the
        # "size must be less than 2147483648" upload failure.  cu118
        # still covers any NVIDIA driver >= R450 (Sep 2020).
        run: |
          pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cu118 "torch>=2.3,<3"
          pip install -r requirements.txt
          pip install "pyinstaller==6.11.1"   # pinned for reproducible bundling behaviour

      - name: Verify CUDA torch bundle
        # Sanity-check: the wheel we just installed should self-report
        # as a CUDA build (version string ends in +cuXYZ).  If the index
        # resolved to the CPU wheel anyway, fail fast — better to break
        # the build than ship another CPU-only .exe.
        shell: pwsh
        run: |
          $ver = python -c "import torch; print(torch.__version__)"
          Write-Host "torch version: $ver"
          if (-not ($ver -match '\+cu')) {
            Write-Error "FATAL: torch is not a CUDA build ($ver) — Windows users would silently fall back to CPU"
            exit 1
          }

      - name: Build exe (onefile)
        # Spec produces a single self-contained FIREFLY.exe.  All binaries
        # (Qt, napari, torch, scientific Python) bundled inside; extracted
        # to %TEMP% at runtime — no chance of user extraction dropping files.
        run: pyinstaller sptpalm.spec --noconfirm --clean

      - name: Verify exe exists and is reasonable size
        shell: pwsh
        run: |
          $exe = "dist\FIREFLY.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "FATAL: $exe not produced by build"
            exit 1
          }
          $sizeBytes = (Get-Item $exe).Length
          $sizeMB = $sizeBytes / 1MB
          Write-Host ("FIREFLY.exe size: {0:N1} MB" -f $sizeMB)
          if ($sizeMB -lt 50) {
            Write-Error "FATAL: $exe is suspiciously small ($sizeMB MB) — bundle is incomplete"
            exit 1
          }
          # GitHub Releases caps individual assets at 2 GiB (2,147,483,648
          # bytes).  Fail HERE with a clear message instead of letting the
          # upload step error out cryptically with
          #   "Validation Failed: size must be less than 2147483648"
          $cap = 2147483648
          if ($sizeBytes -ge $cap) {
            Write-Error ("FATAL: $exe is {0:N0} bytes — GitHub Releases cap is {1:N0}.  Switch to a smaller CUDA wheel or revert to CPU torch." -f $sizeBytes, $cap)
            exit 1
          }

      - name: Smoke test (launch the onefile exe)
        shell: pwsh
        run: |
          # Marker-file handshake: app writes a file only AFTER the
          # PySide6 main window shows and repaints.  Catches startup
          # crashes that PyInstaller hides behind an error dialog
          # (which would otherwise keep HasExited false).
          $exe    = "dist\FIREFLY.exe"
          $marker = Join-Path $env:RUNNER_TEMP "sptpalm_ready.marker"
          Remove-Item -Path $marker -ErrorAction SilentlyContinue
          $env:SPTPALM_READY_MARKER = $marker

          Write-Host "Launching $exe (onefile bootloader will extract to TEMP — first launch is slower)..."
          $proc = Start-Process -FilePath $exe -PassThru -WindowStyle Hidden

          # Onefile cold-start: bootloader extracts ~200 MB of files to %TEMP%
          # then Python loads numpy + scipy + matplotlib + trackpy from a
          # cold disk cache.  120s is generous but not flaky.
          $deadline = (Get-Date).AddSeconds(120)
          $ready = $false
          while ((Get-Date) -lt $deadline) {
            if (Test-Path $marker) { $ready = $true; break }
            if ($proc.HasExited) {
              Write-Error "FATAL: process exited with code $($proc.ExitCode) before writing ready marker"
              exit 1
            }
            Start-Sleep -Milliseconds 500
          }
          if (-not $ready) {
            Write-Error "FATAL: app did not signal ready within 60s — startup crash hidden by error dialog"
            try { $proc.Kill() } catch {}
            exit 1
          }
          Write-Host "OK: ready marker written — onefile bundle is healthy"
          $proc.Kill()
          $proc.WaitForExit(5000) | Out-Null

      - name: Rename exe for release
        # Releases page shows whatever filename we upload — match the
        # name the README tells users to download.
        shell: pwsh
        run: |
          Move-Item dist\FIREFLY.exe dist\FIREFLY-Windows.exe -Force
          Write-Host "Renamed: $(Get-Item dist\FIREFLY-Windows.exe)"

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: FIREFLY-Windows
          path: dist\FIREFLY-Windows.exe
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\FIREFLY-Windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
