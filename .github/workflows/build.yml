name: Build Distributables

# Triggers:
#   - Push a tag like  git tag v1.2.3 && git push --tags
#   - Or run manually from the Actions tab
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # required to create releases and upload assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 before June 2026 deadline

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  #  macOS  →  sptPALM.app  →  sptPALM-macOS.dmg
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest          # arm64 (M-series); change to macos-13 for Intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # 3.12 = best PyInstaller + scientific-Python support

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app
        run: pyinstaller sptpalm.spec --noconfirm --clean

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "sptPALM" \
            -srcfolder "dist/sptPALM.app" \
            -ov -format UDZO \
            "dist/sptPALM-macOS.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: sptPALM-macOS
          path: dist/sptPALM-macOS.dmg
          retention-days: 30

      # Optional: attach to a GitHub Release when a tag is pushed
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sptPALM-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  #  Windows  →  sptPALM folder  →  sptPALM-Windows.zip
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: build-macos   # ensures macOS creates the release first; Windows then uploads to it

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe bundle
        shell: pwsh
        run: |
          # Locate Tcl/Tk data directories using sys.prefix + glob.
          # On the GitHub Actions Windows runner, Python installs its Tcl/Tk
          # data under {sys.prefix}\tcl\tcl8.x\ and {sys.prefix}\tcl\tk8.x\.
          $tclSrc = python -c "
import sys, os, glob
hits = sorted(glob.glob(os.path.join(sys.prefix, 'tcl', 'tcl8*')))
print(hits[-1] if hits else '')
"
          $tkSrc = python -c "
import sys, os, glob
hits = sorted(glob.glob(os.path.join(sys.prefix, 'tcl', 'tk8*')))
print(hits[-1] if hits else '')
"
          Write-Host "TCL dir : $tclSrc"
          Write-Host "TK  dir : $tkSrc"

          if (-not $tclSrc -or -not (Test-Path $tclSrc)) {
            Write-Error "Could not locate tcl8.x directory under $(python -c 'import sys; print(sys.prefix)')\tcl"
            exit 1
          }
          if (-not $tkSrc -or -not (Test-Path $tkSrc)) {
            Write-Error "Could not locate tk8.x directory under $(python -c 'import sys; print(sys.prefix)')\tcl"
            exit 1
          }

          pyinstaller sptpalm.spec --noconfirm --clean `
            --add-data "$tclSrc;_tcl_data" `
            --add-data "$tkSrc;_tk_data"

      - name: Bundle VC++ runtime DLLs
        shell: pwsh
        run: |
          # python312.dll depends on vcruntime140.dll etc., which are not
          # guaranteed to be present on end-user Windows machines.
          $internal = "dist\sptPALM\_internal"
          $pyDir    = python -c "import sys,os; print(os.path.dirname(sys.executable))"
          $sources  = @($pyDir, "$env:SystemRoot\System32")
          foreach ($dll in @("vcruntime140.dll","vcruntime140_1.dll","msvcp140.dll","msvcp140_1.dll")) {
            if (Test-Path (Join-Path $internal $dll)) {
              Write-Host "$dll already in bundle"
              continue
            }
            foreach ($src in $sources) {
              $candidate = Join-Path $src $dll
              if (Test-Path $candidate) {
                Copy-Item $candidate $internal -Force
                Write-Host "Copied $dll from $src"
                break
              }
            }
            if (-not (Test-Path (Join-Path $internal $dll))) {
              Write-Warning "$dll not found — may be missing on some machines"
            }
          }
          Write-Host "--- _internal top-level ---"
          Get-ChildItem $internal | Select-Object Name | Format-Table

      - name: Zip the dist folder
        run: |
          Compress-Archive -Path dist\sptPALM -DestinationPath dist\sptPALM-Windows.zip
        shell: powershell

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: sptPALM-Windows
          path: dist\sptPALM-Windows.zip
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\sptPALM-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
